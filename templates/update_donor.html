<!DOCTYPE html>

<html>

<head>

    <title>
        Update Donor
    </title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:500px;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
            color:red;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
            background:red;
            color:white;
            border:none;
            font-size:16px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>

            Update Donor

        </h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">

                Update Donor

            </button>

        </form>

    </div>

</body>

</html>
