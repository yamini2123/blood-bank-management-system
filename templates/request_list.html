<!DOCTYPE html>

<html>

<head>

    <title>
        Blood Requests
    </title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:40px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 0px 10px gray;
        }

        th{
            background:red;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f9f9f9;
        }

        h1{
            text-align:center;
            color:red;
            margin-bottom:20px;
        }

        a{
            text-decoration:none;
            color:white;
            background:red;
            padding:8px 12px;
            border-radius:5px;
        }

        a:hover{
            background:darkred;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Blood Requests
        </h1>

        <table>

            <tr>

                <th>Patient</th>

                <th>Blood Group</th>

                <th>City</th>

                <th>Mobile</th>

                <th>Units</th>

                <th>Status</th>

                <th>Actions</th>

            </tr>

            {% for r in requests %}

            <tr>

                <td>

                    {{ r.patient_name }}

                </td>

                <td>

                    {{ r.blood_group }}

                </td>

                <td>

                    {{ r.city }}

                </td>

                <td>

                    {{ r.mobile }}

                </td>

                <td>

                    {{ r.units }}

                </td>

                <td>

                    {{ r.status }}

                </td>

                <td>

                    <a href="/complete-request/{{ r.id }}/">

                        Complete

                    </a>

                    <a href="/delete-request/{{ r.id }}/">

                        Delete

                    </a>

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
