<!DOCTYPE html>

<html>

<head>

    <title>
        Login
    </title>
<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap"
rel="stylesheet">
    <style>

    body{

        font-family:'Roboto', sans-serif;

        background:#f5f7fa;

        display:flex;

        justify-content:center;

        align-items:center;

        height:100vh;
    }

    .container{

        width:400px;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0px 5px 20px rgba(0,0,0,0.1);
    }

    h1{

        text-align:center;

        color:#ff416c;

        margin-bottom:30px;

        font-family:'Poppins', sans-serif;
    }

    input{

        width:100%;

        padding:14px;

        margin-top:15px;

        border:1px solid #ccc;

        border-radius:10px;

        font-size:16px;
    }

    input:focus{

        outline:none;

        border-color:#ff416c;
    }

    button{

        background:#ff416c;

        color:white;

        padding:14px;

        border:none;

        width:100%;

        margin-top:25px;

        border-radius:10px;

        font-size:16px;

        font-weight:bold;

        cursor:pointer;

        transition:0.3s;
    }

    button:hover{

        background:#ff1e56;
    }

    p{

        color:red;

        text-align:center;

        margin-top:15px;
    }

</style>
</head>

<body>

    <div class="container">

        <h1>
            Login
        </h1>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
            >

            <button type="submit">

                Login

            </button>

        </form>

        <p>
            {{ message }}
        </p>

    </div>

</body>

</html>
