<h1>Search Blood Donor</h1>

<form method="POST">

    {% csrf_token %}

    <label>Blood Group:</label>

    <select name="blood_group" required>

    <option value="">
        Select Blood Group
    </option>

    <option value="A+">A+</option>
    <option value="A-">A-</option>

    <option value="B+">B+</option>
    <option value="B-">B-</option>

    <option value="O+">O+</option>
    <option value="O-">O-</option>

    <option value="AB+">AB+</option>
    <option value="AB-">AB-</option>

</select>
    <br><br>

    <label>City:</label>

    <input type="text"
           name="city"
           placeholder="Enter City">

    <br><br>

    <button type="submit">
        Search
    </button>

</form>
{% for donor in donors %}

    <h3>Donor Details</h3>

    <p>Name: {{ donor.name }}</p>

    <p>Blood Group: {{ donor.blood_group }}</p>

    <p>City: {{ donor.city }}</p>

    <p>Mobile: {{ donor.mobile }}</p>

    <hr>

{% endfor %}
<hr>
